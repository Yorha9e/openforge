version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openforge
      POSTGRES_PASSWORD: openforge_dev
      POSTGRES_DB: openforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  nodejs-io:
    build: ./nodejs-io
    ports:
      - "50051:50051"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
volumes:
  pgdata:
