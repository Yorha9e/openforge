version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v2.12.0
    out: nodejs-io/src/gen
    opt:
      - target=ts
      - import_extension=.js
  - remote: buf.build/connectrpc/es:v1.6.1
    out: nodejs-io/src/gen
    opt:
      - target=ts
      - import_extension=.js
