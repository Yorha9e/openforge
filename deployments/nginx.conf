# ===== OpenForge Nginx Reverse Proxy =====
# 功能：TLS终止 / 反向代理 / 静态文件 / WebSocket / 限流 / 安全Header
#
# 上游服务（docker-compose 内部域名）：
#   server:8080  → Go API 服务
# 静态文件：       /usr/share/nginx/html → 前端 dist

# ----- 上游定义 -----
upstream go_backend {
    server server:8080;
    keepalive 32;
}

# ----- 限流定义 -----
# 全站限流：100 req/s per IP（配合 Go 层已有的 100/s 限流，形成双重保护）
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;

# 登录接口限流：5 req/min per IP（防暴力破解）
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ----- HTTP → HTTPS 跳转 -----
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME 验证（需要挂载 /var/www/certbot volume 才能使用）
    # 开发环境用自签证书，此路径不生效
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS 主站 -----
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ===== TLS 配置 =====
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;

    # 安全加固
    server_tokens off;
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # ===== 安全 Header =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # TODO: 生产环境收紧 CSP，去掉 'unsafe-inline'（需确认 Vite 构建产物无内联代码）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:;" always;

    # ===== 访问日志 =====
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ===== 1. Prometheus Metrics（仅内网） =====
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 2. WebSocket（必须在 /api 之前，避免被 api 规则吞掉） =====
    location /ws/chat {
        limit_req zone=global burst=50 nodelay;

        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ===== 3. REST API =====
    location /api/ {
        # 登录接口单独限流
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://go_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # 注册接口也限流
        location /api/auth/register {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://go_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # 其余 /api/* 全站限流
        limit_req zone=global burst=50 nodelay;
        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ===== 4. 前端静态文件（SPA fallback） =====
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
