# Standard Docker Compose deployment for Phase 8 HA/Concurrency.
# Architecture:
#   Browser → Nginx(:443 TLS) → Go Server(:8080) / Static Files
#
# TLS certs: run ./certs/generate.sh before first launch.
services:
  # ===== Data Services =====
  postgres:
    image: postgres:15-alpine
    container_name: of-postgres
    environment:
      POSTGRES_USER: openforge
      POSTGRES_DB: openforge
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: of-redis
    ports:
      - "6379:6379"

  # ===== gRPC Services =====
  nodejs-io:
    image: node:20-alpine
    container_name: of-nodejs-io
    working_dir: /app
    volumes:
      - ../nodejs-io:/app
    command: npm run start
    expose:
      - "50051"

  # ===== Go Backend =====
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: of-server
    command: ["-config", "config/profiles/docker-standard.yaml"]
    environment:
      - OF_PROFILE_PUBKEY=dummy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dependency-cache:/cache/deps
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nodejs-io:
        condition: service_started

  # ===== Nginx Reverse Proxy (唯一对外入口) =====
  nginx:
    image: nginx:alpine
    container_name: of-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy

volumes:
  pg-data:
  dependency-cache:
